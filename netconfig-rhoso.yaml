apiVersion: network.openstack.org/v1beta1
kind: NetConfig
metadata:
  name: openstacknetconfig
  namespace: openstack
spec:
  networks:
  - name: ctlplane
    serviceNetwork: ctlplane
    dnsDomain: ctlplane.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 172.16.0.250
        start: 172.16.0.10
      cidr: 172.16.0.0/24
      gateway: 172.16.0.1
      name: subnet1
  - name: internalapi
    serviceNetwork: internalapi
    dnsDomain: internalapi.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 172.17.0.250
        start: 172.17.0.10
      cidr: 172.17.0.0/24
      name: subnet1
  - name: external
    serviceNetwork: external
    dnsDomain: external.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 10.0.0.250
        start: 10.0.0.10
      cidr: 10.0.0.0/24
      gateway: 10.0.0.1
      name: subnet1
  - name: storage
    serviceNetwork: storage
    dnsDomain: storage.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 172.18.0.250
        start: 172.18.0.10
      cidr: 172.18.0.0/24
      name: subnet1
  - name: storagemgmt
    serviceNetwork: storagemgmt
    dnsDomain: storagemgmt.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 172.19.0.250
        start: 172.19.0.10
      cidr: 172.19.0.0/24
      name: subnet1
  - name: tenant
    serviceNetwork: tenant
    dnsDomain: tenant.rhoso.h45h.net
    subnets:
    - allocationRanges:
      - end: 172.20.0.250
        start: 172.20.0.10
      cidr: 172.20.0.0/24
      name: subnet1
