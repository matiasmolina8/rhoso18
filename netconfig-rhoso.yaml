apiVersion: network.openstack.org/v1beta1
kind: NetConfig
metadata:
  name: openstacknetconfig
  namespace: openstack
spec:
  networks:
    - name: Ctlplane
      nameLower: ctlplane
      isControlPlane: true
      subnets:
        - name: subnet1
          ipv4:
            cidr: 172.16.0.0/24
            allocationStart: 172.16.0.10
            allocationEnd: 172.16.0.250
            gateway: 172.16.0.1

    - name: InternalApi
      nameLower: internalapi
      subnets:
        - name: subnet1
          ipv4:
            cidr: 172.17.0.0/24
            allocationStart: 172.17.0.10
            allocationEnd: 172.17.0.250

    - name: External
      nameLower: external # Mapea a tu pubapi
      subnets:
        - name: subnet1
          ipv4:
            cidr: 10.0.0.0/24
            allocationStart: 10.0.0.10
            allocationEnd: 10.0.0.250
            gateway: 10.0.0.1

    - name: Storage
      nameLower: storage
      subnets:
        - name: subnet1
          ipv4:
            cidr: 172.18.0.0/24
            allocationStart: 172.18.0.10
            allocationEnd: 172.18.0.250

    - name: StorageMgmt
      nameLower: storagemgmt
      subnets:
        - name: subnet1
          ipv4:
            cidr: 172.19.0.0/24
            allocationStart: 172.19.0.10
            allocationEnd: 172.19.0.250

    - name: Tenant
      nameLower: tenant
      subnets:
        - name: subnet1
          ipv4:
            cidr: 172.20.0.0/24
            allocationStart: 172.20.0.10
            allocationEnd: 172.20.0.250
