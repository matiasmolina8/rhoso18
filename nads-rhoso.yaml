apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ctlplane
  namespace: openstack
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ctlplane",
      "type": "macvlan",
      "master": "enp12s0",
      "ipam": {
        "type": "whereabouts",
        "range": "172.16.0.0/24",
        "range_start": "172.16.0.101",
        "range_end": "172.16.0.141"
      }
    }
---
